<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <description>Prefer Nerd Font symbols before CJK fallbacks in terminals.</description>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Ubuntu Sans Mono</family>
      <family>FiraMono Nerd Font Mono</family>
      <family>Noto Color Emoji</family>
      <family>Noto Sans Mono CJK JP</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test name="family">
      <string>Ubuntu Sans Mono</string>
    </test>
    <edit name="family" mode="append" binding="strong">
      <string>FiraMono Nerd Font Mono</string>
    </edit>
  </match>
</fontconfig>
